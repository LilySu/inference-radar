# Per-repo PR taxonomy. The classifier picks one of the listed slugs as
# `primary_category` (or proposes `novel_category_proposed` if none fit with
# confidence > ~0.6). Edit slugs/names freely; bump PROMPT_VERSION in
# radar.classify when the taxonomy changes so re-classifies are diffable.
#
# Distilled from ~/wsl_git/inference-ideas/{vllm,sglang,megatron-lm,tensorrt-llm}-pr-research.md.

