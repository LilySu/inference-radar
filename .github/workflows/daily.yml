name: radar
on:
  schedule:
    # Hourly ingest + firsts. Run off the :00 to avoid GH cron herding.
    - cron: "47 * * * *"
    # Daily full run including classify + brief + site export. 12:13 UTC ≈ 8:13 ET.
    - cron: "13 12 * * *"
  workflow_dispatch:
    inputs:
      run_brief:
        type: boolean
        description: "Force the daily brief pipeline (classify + brief + export)"
        default: false

permissions:
  contents: write

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pipx install uv

      - name: uv sync
        run: uv sync --extra anthropic

      # Persist data/radar.db across runs. Without this, every hourly run starts
      # from an empty DB, re-ingests everything, and re-sends ntfy notifications
      # for the same issues because the `notifications` dedup table is gone.
      # Cache size grows ~1 MB/day; LRU eviction at the 10 GB repo limit.
      - name: Restore SQLite DB cache
        uses: actions/cache@v4
        with:
          path: data/radar.db
          key: radar-db-${{ github.run_id }}
          restore-keys: |
            radar-db-

      # --- always: ingest ---
      - name: Ingest issues + PRs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: uv run python -m radar.ingest

      # --- always: firsts (cheap; <30 calls usually) ---
      # LLM router uses Groq with llama-3.3-70b-versatile (70B, ≥32B per user
      # preference). Free-tier limits (30 RPM, ~6k TPM) handle the steady-state
      # hourly load; max_evaluate is capped at 25 to avoid the rate-limit blowout
      # we hit on cold-cache bootstrap. Backlog drains across subsequent hours.
      - name: Firsts — 3-pass filter + ntfy
        env:
          RADAR_LLM: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOPIC_SPECULATIVE: ${{ secrets.NTFY_TOPIC_SPECULATIVE }}
        run: uv run python -m radar.firsts --max-evaluate 25

      # --- always: per-repo PR alerts (6 feeds, capped 3 ntfy/feed/run) ---
      - name: PR alerts — per-repo feeds
        env:
          RADAR_LLM: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          NTFY_TOPIC_VLLM_BW:  ${{ secrets.NTFY_TOPIC_VLLM_BW }}
          NTFY_TOPIC_VLLM_ALL: ${{ secrets.NTFY_TOPIC_VLLM_ALL }}
          NTFY_TOPIC_SGL_BW:   ${{ secrets.NTFY_TOPIC_SGL_BW }}
          NTFY_TOPIC_SGL_ALL:  ${{ secrets.NTFY_TOPIC_SGL_ALL }}
          NTFY_TOPIC_TRT_BW:   ${{ secrets.NTFY_TOPIC_TRT_BW }}
          NTFY_TOPIC_TRT_ALL:  ${{ secrets.NTFY_TOPIC_TRT_ALL }}
        run: uv run python -m radar.pr_alerts

      # --- always: per-repo "achievable issue" alerts (4 feeds, capped 3/feed/run) ---
      - name: Issue alerts — Megatron / FlashInfer / TileLang / CUTLASS
        env:
          RADAR_LLM: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          NTFY_TOPIC_MEG_FIRSTS:     ${{ secrets.NTFY_TOPIC_MEG_FIRSTS }}
          NTFY_TOPIC_FLASH_FIRSTS:   ${{ secrets.NTFY_TOPIC_FLASH_FIRSTS }}
          NTFY_TOPIC_TILE_FIRSTS:    ${{ secrets.NTFY_TOPIC_TILE_FIRSTS }}
          NTFY_TOPIC_CUTLASS_FIRSTS: ${{ secrets.NTFY_TOPIC_CUTLASS_FIRSTS }}
        run: uv run python -m radar.issue_alerts

      # --- daily only: classify + brief + export ---
      - name: Setup ffmpeg + Marp + Piper
        if: github.event.schedule == '13 12 * * *' || inputs.run_brief
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          npm install -g @marp-team/marp-cli@latest
          # Piper TTS — small voice model
          pip install piper-tts
          mkdir -p ~/.piper-voices
          curl -sSL -o ~/.piper-voices/en_US-lessac-medium.onnx \
            https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium/en_US-lessac-medium.onnx
          curl -sSL -o ~/.piper-voices/en_US-lessac-medium.onnx.json \
            https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium/en_US-lessac-medium.onnx.json

      # --max 50 (was 200) keeps the run inside the Groq free-tier TPD budget
      # even with retries; 200 was exhausting the daily quota and 429-ing every
      # subsequent call in this run (incl. brief). Backlog drains across days.
      - name: Classify recent PRs
        if: github.event.schedule == '13 12 * * *' || inputs.run_brief
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: uv run python -m radar.classify --max 50

      # Force a Groq TPM-minute boundary between classify and brief.
      # Classify's batched calls saturate the per-minute token budget; without
      # this gap, brief hits 429 on attempt 0 and exhausts its 30s backoff before
      # the limit resets. Repeated daily-cron failures on 2026-06-20 and -21.
      - name: Wait for Groq TPM window to reset
        if: github.event.schedule == '13 12 * * *' || inputs.run_brief
        run: sleep 65

      - name: Build daily brief
        if: github.event.schedule == '13 12 * * *' || inputs.run_brief
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PIPER_MODEL: /home/runner/.piper-voices/en_US-lessac-medium.onnx
        run: uv run python -m radar.brief

      - name: Export SQLite slices to site/data/
        if: github.event.schedule == '13 12 * * *' || inputs.run_brief
        run: uv run python -m radar.export

      # --- always: commit data updates ---
      # Rebase + retry on push: concurrent runs can race even with concurrency.group
      # (checkout pins github.sha at queue time, which goes stale if a sibling run
      # pushes while this one waits). Pull --rebase reconciles; retry covers any
      # mid-run push by a sibling.
      - name: Commit data updates
        run: |
          git config user.name  "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data/ site/data/ || true
          git diff --cached --quiet && exit 0
          git commit -m "data: $(date -u +%FT%TZ)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep $((RANDOM % 10 + 5))
          done
          exit 1

      - uses: actions/upload-artifact@v4
        if: always() && (github.event.schedule == '13 12 * * *' || inputs.run_brief)
        with:
          name: brief-out
          path: out/
          if-no-files-found: warn
